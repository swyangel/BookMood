<div class="dashboard-container">
  <div *ngIf="carregando" class="loading-state">
    <div class="spinner"></div>
    <p>Carregando seu cantinho literário...</p>
  </div>

  <div *ngIf="!carregando" class="fade-in">
    
    <header class="boas-vindas">
      <div class="texto-boas-vindas">
        <h2>Olá, {{ usuarioNome }}! 👋</h2>
        <p>Gerencie suas leituras e acompanhe seu progresso.</p>
      </div>
      
      <nav class="dashboard-menu">
        <button class="btn-biblioteca" [routerLink]="['/biblioteca-pessoal']">
          📖 Biblioteca Pessoal
        </button>
        <button class="btn-novo-livro" routerLink="/livros">
          📚 Explorar Livros
        </button>
      </nav>
    </header>

    <section class="grid-cards">
      <app-dashboard-cards 
        *ngFor="let card of cardsData" 
        [titulo]="card.titulo" 
        [valor]="card.valor" 
        [icone]="card.icone" 
        [cor]="card.cor">
      </app-dashboard-cards>
    </section>

    <section class="area-graficos">
      <div class="grafico-box">
        <h3>Seu Humor nas Leituras</h3>
        <div class="grafico-placeholder">
          <p class="aviso-grafico">Gráfico de distribuição emocional em breve...</p>
        </div>
      </div>
    </section>
  </div>
</div>
