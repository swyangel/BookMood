<div class="container-auth">
  <h2>Criar Conta</h2>
  
  <form (submit)="cadastrar()">
    <input [(ngModel)]="usuario.email" name="email" type="email" placeholder="E-mail" required>
    <input [(ngModel)]="usuario.password" name="password" type="password" placeholder="Senha" required>
    
    <button type="submit">Cadastrar</button>
  </form>

  <p class="feedback">{{ mensagem }}</p>
</div>
