<div class="login-container">
  <div class="login-card">
    <div class="header-login">
      <h2>Acesse o BookMood 📖</h2>
      <p>Acompanhe suas leituras e descubra como elas afetam o seu humor.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="entrar()">
      
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" formControlName="email" placeholder="seu@email.com">
        <span class="error-message" *ngIf="email.invalid && email.touched">
          Insira um e-mail válido.
        </span>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" formControlName="password" placeholder="Sua senha secreta">
        
        <span class="error-message" *ngIf="password.invalid && password.touched">
          A senha deve ter pelo menos 6 caracteres.
        </span>
      </div>

      <div class="mensagem-erro" *ngIf="mensagemErro">
        {{ mensagemErro }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || carregando">
        {{ carregando ? 'Entrando...' : 'Acessar' }}
      </button>

    </form>

    <div class="link-cadastro">
      <p>Ainda não tem uma conta? <a routerLink="/cadastro">Cadastre-se aqui</a></p>
    </div>
  </div>
</div>
